<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内蒙古自治区 - 非遗之路</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-color: #c9a962;
            --primary-dark: #8b7355;
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --accent-red: #8b0000;
            --border-color: #333;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 20% 20%, rgba(201, 169, 98, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(139, 0, 0, 0.06) 0%, transparent 50%),
                        linear-gradient(180deg, #0a0a0a 0%, #151515 100%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            gap: 20px;
            min-height: 100vh;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            position: relative;
            flex: 1;
        }
        
        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 200px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
        }
        
        .title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }
        
        .title-icon {
            width: 50px; height: 50px;
            fill: var(--primary-color);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        h1 {
            font-family: "Microsoft YaHei", serif;
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color) 0%, #f5deb3 50%, var(--primary-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            letter-spacing: 4px;
            margin-top: 10px;
        }
        
        .breadcrumb {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            transition: all 0.3s ease;
        }
        
        .breadcrumb:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(201, 169, 98, 0.1);
        }
        
        .breadcrumb a {
            color: var(--primary-color);
            text-decoration: none;
            cursor: pointer;
            font-size: 0.95rem;
        }
        
        .breadcrumb a:hover {
            color: #f5deb3;
            text-shadow: 0 0 10px rgba(201, 169, 98, 0.5);
        }
        
        .breadcrumb span {
            color: var(--text-secondary);
        }
        
        .breadcrumb .current {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            gap: 20px;
        }
        
        .map-container {
            flex: 3;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        #map {
            width: 100%;
            height: 600px;
            border-radius: 8px;
        }
        
        .sidebar {
            flex: 1;
            min-width: 250px;
            max-width: 300px;
        }
        
        .city-list {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .city-list h3 {
            color: var(--primary-color);
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .city-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(201, 169, 98, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .city-item:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(201, 169, 98, 0.1);
            transform: translateX(5px);
        }
        
        .city-number {
            width: 30px;
            height: 30px;
            background: var(--primary-color);
            color: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
        }
        
        .city-info h4 {
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 2px;
        }
        
        .city-info p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .province-nav {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }
        
        .province-nav h3 {
            color: var(--primary-color);
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .province-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .province-link {
            padding: 8px 12px;
            background: rgba(201, 169, 98, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            text-align: center;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        
        .province-link:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            box-shadow: 0 0 10px rgba(201, 169, 98, 0.1);
        }
        
        .loading {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            border-radius: 12px;
        }
        
        .loading-content {
            text-align: center;
        }
        
        .loading-text {
            color: var(--text-primary);
            font-size: 1.2rem;
            margin-top: 20px;
        }
        
        .loading.hidden {
            display: none;
        }
        
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        
        .welcome-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .welcome-content {
            text-align: center;
            position: relative;
        }
        
        .welcome-decor {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 1px solid rgba(201, 169, 98, 0.2);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }
        
        .welcome-decor::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 1px solid rgba(201, 169, 98, 0.3);
            border-radius: 50%;
        }
        
        .welcome-decor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 1px solid rgba(201, 169, 98, 0.4);
            border-radius: 50%;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .welcome-text {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c9a962 0%, #f5deb3 50%, #c9a962 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: scale(0.5);
            animation: welcomeIn 1s ease forwards;
            animation-delay: 0.3s;
            text-shadow: 0 0 40px rgba(201, 169, 98, 0.5);
            letter-spacing: 4px;
            position: relative;
            z-index: 1;
        }
        
        .welcome-subtitle {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: subtitleIn 0.8s ease forwards;
            animation-delay: 0.8s;
            letter-spacing: 12px;
        }
        
        .welcome-icon {
            width: 80px;
            height: 80px;
            fill: var(--primary-color);
            opacity: 0;
            animation: iconIn 0.6s ease forwards;
            margin-bottom: 30px;
        }
        
        @keyframes welcomeIn {
            0% {
                opacity: 0;
                transform: scale(0.5);
                filter: blur(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }
        
        @keyframes subtitleIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes iconIn {
            0% {
                opacity: 0;
                transform: translateY(-30px) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .welcome-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 3s ease-in-out infinite;
        }
        
        @keyframes particleFloat {
            0%, 100% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }
            10% {
                opacity: 0.8;
                transform: scale(1);
            }
            90% {
                opacity: 0.8;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0);
            }
        }
        
        @media (max-width: 1200px) {
            .main-content {
                flex-direction: column;
            }
            
            .sidebar {
                max-width: 100%;
                min-width: 100%;
            }
            
            .province-links {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .home-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #8b0000, #c9a962);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(139, 0, 0, 0.3);
            z-index: 1000;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(139, 0, 0, 0.5);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 2rem;
                letter-spacing: 4px;
            }
            
            #map {
                height: 400px;
            }
            
            .province-links {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="welcome-overlay" id="welcomeOverlay">
        <div class="welcome-particles">

    <script>
        // 非遗城市数据
        const heritageCities = [
            { name: "北京", adcode: 110000, lng: 116.405285, lat: 39.904989, province: "北京市" },
            { name: "呼和浩特", adcode: 150100, lng: 111.751990, lat: 40.841140, province: "内蒙古自治区" },
            { name: "西安", adcode: 610100, lng: 108.939770, lat: 34.341600, province: "陕西省" },
            { name: "开封", adcode: 410200, lng: 114.307500, lat: 34.797010, province: "河南省" },
            { name: "焦作", adcode: 410800, lng: 113.241930, lat: 35.215890, province: "河南省" },
            { name: "成都", adcode: 510100, lng: 104.066670, lat: 30.572790, province: "四川省" },
            { name: "黔东南", adcode: 522600, lng: 107.985330, lat: 26.583990, province: "贵州省" },
            { name: "昆山", adcode: 320583, lng: 120.958100, lat: 31.384820, province: "江苏省" },
            { name: "苏州", adcode: 320500, lng: 120.585310, lat: 31.298890, province: "江苏省" },
            { name: "衡阳", adcode: 430400, lng: 112.571940, lat: 26.893300, province: "湖南省" },
            { name: "佛山", adcode: 440600, lng: 113.122710, lat: 23.028760, province: "广东省" },
            { name: "湘西", adcode: 433100, lng: 109.738130, lat: 28.312060, province: "湖南省" }
        ];
        
        // 当前省份信息
        const currentProvince = {
            name: "内蒙古自治区",
            adcode: 150000,
            center: [111.670801, 40.818311]
        };
        
        // 筛选当前省份的非遗城市
        const provinceCities = heritageCities.filter(city => 
            city.province === currentProvince.name || 
            city.adcode.toString().startsWith(currentProvince.adcode.toString().substring(0, 2))
        );
        
        let chart = null;
        let provinceCache = {};
        
        function initCityList() {
            const cityList = document.getElementById('city-list');
            cityList.innerHTML = provinceCities.map((city, index) => `
                <div class="city-item" onclick="focusCity(${city.adcode}, '${city.name}', ${city.lng}, ${city.lat})">
                    <div class="city-number">${index + 1}</div>
                    <div class="city-info">
                        <h4>${city.name}</h4>
                        <p>${city.province}</p>
                    </div>
                </div>
            `).join('');
        }
        
        function focusCity(adcode, name, lng, lat) {
            chart.setOption({
                geo: {
                    center: [lng, lat],
                    zoom: 6
                }
            });
        }
        
        async function loadProvince(adcode) {
            if (provinceCache[adcode]) return provinceCache[adcode];
            
            try {
                const response = await fetch(`https://geo.datav.aliyun.com/areas_v3/bound/${adcode}_full.json`);
                const data = await response.json();
                provinceCache[adcode] = data;
                return data;
            } catch (error) {
                console.error('加载省份数据失败:', error);
                return null;
            }
        }
        
        async function initChart() {
            chart = echarts.init(document.getElementById('map'));
            
            const provinceData = await loadProvince(currentProvince.adcode);
            if (!provinceData) {
                document.querySelector('.loading-text').textContent = '加载失败，请刷新页面重试';
                return;
            }
            
            echarts.registerMap(currentProvince.name, provinceData);
            
            const features = provinceData.features || [];
            const data = features.map(f => ({
                name: f.properties.name,
                value: f.properties.center || [0, 0],
                adcode: f.properties.adcode
            }));
            
            // 非遗城市坐标
            const heritageCityCoords = provinceCities.map(city => [city.lng, city.lat]);
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        return `<strong>${params.name}</strong><br/>点击查看详情`;
                    },
                    backgroundColor: 'rgba(26, 26, 26, 0.95)',
                    borderColor: '#c9a962',
                    borderWidth: 1,
                    textStyle: { color: '#f5f5f5' }
                },
                geo: {
                    map: currentProvince.name,
                    roam: true,
                    zoom: 1.2,
                    center: currentProvince.center,
                    label: {
                        show: true,
                        color: '#f5f5f5',
                        fontSize: 10
                    },
                    itemStyle: {
                        areaColor: 'rgba(201, 169, 98, 0.2)',
                        borderColor: 'rgba(201, 169, 98, 0.5)',
                        borderWidth: 1
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: 'rgba(201, 169, 98, 0.4)'
                        },
                        label: {
                            color: '#f5f5f5'
                        }
                    }
                },
                series: [
                    {
                        name: '非遗城市',
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        data: provinceCities.map(city => ({
                            name: city.name,
                            value: [city.lng, city.lat],
                            adcode: city.adcode
                        })),
                        symbolSize: 15,
                        itemStyle: {
                            color: '#8b0000'
                        },
                        emphasis: {
                            itemStyle: {
                                color: '#ff6b6b',
                                shadowBlur: 10,
                                shadowColor: 'rgba(255, 107, 107, 0.8)'
                            }
                        },
                        tooltip: {
                            formatter: function(params) {
                                return `<strong>${params.name}</strong><br/>非遗城市`;
                            }
                        }
                    }
                ]
            };
            
            chart.setOption(option);
            
            // 窗口大小变化时重新调整
            window.addEventListener('resize', function() {
                chart.resize();
            });
        }
        
        async function loadMapData() {
            try {
                await initChart();
                initCityList();
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 500);
                
                setTimeout(() => {
                    document.getElementById('welcomeOverlay').classList.add('hidden');
                }, 2000);
            } catch (error) {
                console.error('加载地图数据失败:', error);
                document.querySelector('.loading-text').textContent = '加载失败，请刷新页面重试';
            }
        }
        
        // 页面加载完成后初始化
        window.onload = loadMapData;
    </script>
</body>
</html>
